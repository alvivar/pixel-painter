<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Pixel Painter</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      body {
        overflow: hidden;
        background: #1a1a1a;
      }
      canvas {
        display: block;
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <script>
      const PX = 24;
      const MIN_SCALE = 0.25;
      const MAX_SCALE = 8;
      const PAL = [
        "#000000",
        "#1D2B53",
        "#7E2553",
        "#008751",
        "#AB5236",
        "#5F574F",
        "#C2C3C7",
        "#FFF1E8",
        "#FF004D",
        "#FFA300",
        "#FFEC27",
        "#00E436",
        "#29ADFF",
        "#83769C",
        "#FF77A8",
        "#FFCCAA",
      ];
      const BAR_H = 32;

      const canvas = document.createElement("canvas");
      document.body.appendChild(canvas);
      const ctx = canvas.getContext("2d");

      const SAVE_KEY = "pixelpainter";
      const filled = new Map(); // key -> { x, y, ci }

      function makeKey(x, y) {
        return x + "," + y;
      }
      function parseKey(k) {
        const sep = k.indexOf(",");
        return [+k.slice(0, sep), +k.slice(sep + 1)];
      }

      let mode = null; // 'paint' | 'erase' | 'pan'
      let color = 0;
      let saveTimer = 0;
      let panX = 0,
        panY = 0;
      let panStartX, panStartY, panOriginX, panOriginY;
      let scale = 1;
      let cellSize = PX * scale;
      let lastModifiedX = null,
        lastModifiedY = null;
      let dirty = true;
      let activeTouches = 0;

      function resize() {
        canvas.width = innerWidth;
        canvas.height = innerHeight;
        dirty = true;
      }

      function draw() {
        const S = cellSize;
        const w = canvas.width,
          h = canvas.height;
        const gridH = h - BAR_H;
        ctx.fillStyle = "#fff";
        ctx.fillRect(0, 0, w, gridH);

        const ox = ((panX % S) + S) % S;
        const oy = ((panY % S) + S) % S;

        // Grid lines — hide when zoomed out far enough to avoid visual noise
        if (S >= 4) {
          ctx.strokeStyle = "#ccc";
          ctx.beginPath();
          for (let x = ox; x <= w; x += S) {
            ctx.moveTo(x, 0);
            ctx.lineTo(x, gridH);
          }
          for (let y = oy; y <= gridH; y += S) {
            ctx.moveTo(0, y);
            ctx.lineTo(w, y);
          }
          ctx.stroke();
        }

        // Filled cells — batch by color to minimize fillStyle changes
        const buckets = new Array(PAL.length);
        for (const [, cell] of filled) {
          const sx = cell.x * S + panX;
          const sy = cell.y * S + panY;
          if (sx + S > 0 && sx < w && sy + S > 0 && sy < gridH) {
            (buckets[cell.ci] || (buckets[cell.ci] = [])).push(sx, sy);
          }
        }
        for (let i = 0; i < PAL.length; i++) {
          const b = buckets[i];
          if (!b) continue;
          ctx.fillStyle = PAL[i];
          for (let j = 0; j < b.length; j += 2)
            ctx.fillRect(b[j], b[j + 1], S, S);
        }

        // Palette bar
        const sw = w / PAL.length;
        for (let i = 0; i < PAL.length; i++) {
          ctx.fillStyle = PAL[i];
          ctx.fillRect(i * sw, gridH, sw, BAR_H);
        }
        // Selection indicator — use luminance for contrast
        const c = PAL[color],
          r = parseInt(c.slice(1, 3), 16),
          g = parseInt(c.slice(3, 5), 16),
          b_ = parseInt(c.slice(5, 7), 16);
        ctx.strokeStyle =
          r * 0.299 + g * 0.587 + b_ * 0.114 > 140 ? "#000" : "#fff";
        ctx.lineWidth = 3;
        ctx.strokeRect(color * sw + 2, gridH + 2, sw - 4, BAR_H - 4);
        ctx.lineWidth = 1;
      }

      function cellAt(e) {
        const x = Math.floor((e.clientX - panX) / cellSize);
        const y = Math.floor((e.clientY - panY) / cellSize);
        return { key: makeKey(x, y), x, y };
      }

      function hitPalette(e) {
        if (e.clientY < canvas.height - BAR_H) return -1;
        return Math.floor(e.clientX / (canvas.width / PAL.length));
      }

      function save() {
        const cells = [];
        for (const [k, v] of filled) cells.push([k, v.ci]);
        const lastModified =
          lastModifiedX != null ? makeKey(lastModifiedX, lastModifiedY) : null;
        localStorage.setItem(
          SAVE_KEY,
          JSON.stringify({ cells, lastModified }),
        );
      }

      function scheduleSave() {
        clearTimeout(saveTimer);
        saveTimer = setTimeout(save, 300);
      }

      function load() {
        const raw = localStorage.getItem(SAVE_KEY);
        if (!raw) return;
        const data = JSON.parse(raw);
        // Support both old format (array) and new format (object)
        const cells = Array.isArray(data) ? data : data.cells;
        for (const [k, ci] of cells) {
          const [x, y] = parseKey(k);
          filled.set(k, { x, y, ci });
        }
        if (!Array.isArray(data) && data.lastModified) {
          [lastModifiedX, lastModifiedY] = parseKey(data.lastModified);
        }
      }

      function applyPaint(e) {
        const { key, x, y } = cellAt(e);
        if (mode === "erase") {
          filled.delete(key);
        } else {
          filled.set(key, { x, y, ci: color });
          lastModifiedX = x;
          lastModifiedY = y;
        }
        dirty = true;
      }

      canvas.onpointerdown = (e) => {
        if (e.pointerType === "touch") activeTouches++;
        if (activeTouches >= 2) return; // suppress painting during pinch
        const pi = hitPalette(e);
        if (pi >= 0 && e.button === 0) {
          color = pi;
          dirty = true;
          return;
        }
        if (e.button === 1) {
          mode = "pan";
          panStartX = e.clientX;
          panStartY = e.clientY;
          panOriginX = panX;
          panOriginY = panY;
          canvas.setPointerCapture(e.pointerId);
        } else if (e.clientY < canvas.height - BAR_H) {
          mode = e.button === 2 ? "erase" : "paint";
          applyPaint(e);
        }
      };

      canvas.onpointermove = (e) => {
        if (!mode || activeTouches >= 2) return;
        if (mode === "pan") {
          panX = panOriginX + (e.clientX - panStartX);
          panY = panOriginY + (e.clientY - panStartY);
          dirty = true;
        } else if (e.clientY < canvas.height - BAR_H) {
          if (e.getCoalescedEvents) {
            for (const ce of e.getCoalescedEvents()) applyPaint(ce);
          } else {
            applyPaint(e);
          }
        }
      };

      onpointerup = (e) => {
        if (e.pointerType === "touch")
          activeTouches = Math.max(0, activeTouches - 1);
        if (mode === "paint" || mode === "erase") scheduleSave();
        mode = null;
      };
      canvas.oncontextmenu = (e) => e.preventDefault();

      canvas.addEventListener(
        "wheel",
        (e) => {
          e.preventDefault();
          if (e.shiftKey) {
            // Shift+scroll → pan
            panX -= e.deltaX;
            panY -= e.deltaY;
          } else {
            // Scroll → zoom toward cursor
            const zoomFactor = Math.pow(0.995, e.deltaY);
            const newScale = Math.min(
              MAX_SCALE,
              Math.max(MIN_SCALE, scale * zoomFactor),
            );
            const ratio = newScale / scale;
            panX = e.clientX - (e.clientX - panX) * ratio;
            panY = e.clientY - (e.clientY - panY) * ratio;
            scale = newScale;
            cellSize = PX * scale;
          }
          dirty = true;
        },
        { passive: false },
      );

      // Pinch-to-zoom
      let lastTouchDist = 0;
      let lastTouchCenter = null;

      canvas.addEventListener(
        "touchstart",
        (e) => {
          if (e.touches.length === 2) {
            e.preventDefault();
            const [a, b] = e.touches;
            lastTouchDist = Math.hypot(
              a.clientX - b.clientX,
              a.clientY - b.clientY,
            );
            lastTouchCenter = {
              x: (a.clientX + b.clientX) / 2,
              y: (a.clientY + b.clientY) / 2,
            };
          }
        },
        { passive: false },
      );

      canvas.addEventListener(
        "touchmove",
        (e) => {
          if (e.touches.length === 2) {
            e.preventDefault();
            const [a, b] = e.touches;
            const dist = Math.hypot(
              a.clientX - b.clientX,
              a.clientY - b.clientY,
            );
            const center = {
              x: (a.clientX + b.clientX) / 2,
              y: (a.clientY + b.clientY) / 2,
            };

            // Zoom toward pinch center
            const ratio = dist / lastTouchDist;
            const newScale = Math.min(
              MAX_SCALE,
              Math.max(MIN_SCALE, scale * ratio),
            );
            const actualRatio = newScale / scale;
            panX = center.x - (center.x - panX) * actualRatio;
            panY = center.y - (center.y - panY) * actualRatio;

            // Pan with two-finger drag
            panX += center.x - lastTouchCenter.x;
            panY += center.y - lastTouchCenter.y;

            scale = newScale;
            cellSize = PX * scale;
            lastTouchDist = dist;
            lastTouchCenter = center;
            dirty = true;
          }
        },
        { passive: false },
      );

      load();
      onresize = resize;
      resize();

      // Center on last modified pixel
      if (lastModifiedX != null) {
        panX = Math.round(canvas.width / 2 - (lastModifiedX + 0.5) * cellSize);
        panY = Math.round(
          (canvas.height - BAR_H) / 2 - (lastModifiedY + 0.5) * cellSize,
        );
        dirty = true;
      }

      (function frame() {
        if (dirty) {
          dirty = false;
          draw();
        }
        requestAnimationFrame(frame);
      })();
    </script>
  </body>
</html>
