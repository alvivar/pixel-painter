<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Pixel Painter</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      body {
        overflow: hidden;
        background: #1a1a1a;
      }
      canvas {
        display: block;
      }
    </style>
  </head>
  <body>
    <script>
      const PX = 24;
      const PAL = [
        "#000000", "#1D2B53", "#7E2553", "#008751",
        "#AB5236", "#5F574F", "#C2C3C7", "#FFF1E8",
        "#FF004D", "#FFA300", "#FFEC27", "#00E436",
        "#29ADFF", "#83769C", "#FF77A8", "#FFCCAA",
      ];
      const BAR_H = 32;

      const canvas = document.createElement("canvas");
      document.body.appendChild(canvas);
      const ctx = canvas.getContext("2d");

      const SAVE_KEY = "pixelpainter";
      const filled = new Map(); // key -> color index
      let mode = null; // 'paint' | 'erase' | 'pan'
      let color = 0;
      let saveTimer = 0;
      let panX = 0, panY = 0;
      let panStartX, panStartY, panOriginX, panOriginY;
      let dirty = true;

      function resize() {
        canvas.width = innerWidth;
        canvas.height = innerHeight;
        dirty = true;
      }

      function draw() {
        const w = canvas.width, h = canvas.height;
        const gridH = h - BAR_H;
        ctx.fillStyle = "#fff";
        ctx.fillRect(0, 0, w, gridH);

        const ox = panX % PX;
        const oy = panY % PX;

        // Grid lines
        ctx.strokeStyle = "#ccc";
        ctx.beginPath();
        for (let x = ox; x <= w; x += PX) {
          ctx.moveTo(x, 0);
          ctx.lineTo(x, gridH);
        }
        for (let y = oy; y <= gridH; y += PX) {
          ctx.moveTo(0, y);
          ctx.lineTo(w, y);
        }
        ctx.stroke();

        // Filled cells — batch by color to minimize fillStyle changes
        const buckets = new Array(PAL.length);
        for (const [k, ci] of filled) {
          const sep = k.indexOf(",");
          const sx = +k.slice(0, sep) * PX + panX;
          const sy = +k.slice(sep + 1) * PX + panY;
          if (sx + PX > 0 && sx < w && sy + PX > 0 && sy < gridH) {
            (buckets[ci] || (buckets[ci] = [])).push(sx, sy);
          }
        }
        for (let i = 0; i < PAL.length; i++) {
          const b = buckets[i];
          if (!b) continue;
          ctx.fillStyle = PAL[i];
          for (let j = 0; j < b.length; j += 2) ctx.fillRect(b[j], b[j + 1], PX, PX);
        }

        // Palette bar
        const sw = w / PAL.length;
        for (let i = 0; i < PAL.length; i++) {
          ctx.fillStyle = PAL[i];
          ctx.fillRect(i * sw, gridH, sw, BAR_H);
        }
        // Selection indicator — use luminance for contrast
        const c = PAL[color], r = parseInt(c.slice(1, 3), 16), g = parseInt(c.slice(3, 5), 16), b_ = parseInt(c.slice(5, 7), 16);
        ctx.strokeStyle = r * 0.299 + g * 0.587 + b_ * 0.114 > 140 ? "#000" : "#fff";
        ctx.lineWidth = 3;
        ctx.strokeRect(color * sw + 2, gridH + 2, sw - 4, BAR_H - 4);
        ctx.lineWidth = 1;
      }

      function cellAt(e) {
        const wx = e.clientX - panX;
        const wy = e.clientY - panY;
        const cx = Math.floor(wx / PX);
        const cy = Math.floor(wy / PX);
        return cx + "," + cy;
      }

      function hitPalette(e) {
        if (e.clientY < canvas.height - BAR_H) return -1;
        return Math.floor(e.clientX / (canvas.width / PAL.length));
      }

      function save() {
        localStorage.setItem(SAVE_KEY, JSON.stringify([...filled]));
      }

      function scheduleSave() {
        clearTimeout(saveTimer);
        saveTimer = setTimeout(save, 300);
      }

      function load() {
        const data = localStorage.getItem(SAVE_KEY);
        if (!data) return;
        for (const [k, ci] of JSON.parse(data)) filled.set(k, ci);
      }

      function applyPaint(e) {
        const k = cellAt(e);
        mode === "erase" ? filled.delete(k) : filled.set(k, color);
        dirty = true;
      }

      canvas.onpointerdown = (e) => {
        const pi = hitPalette(e);
        if (pi >= 0 && e.button === 0) {
          color = pi;
          dirty = true;
          return;
        }
        if (e.button === 1) {
          mode = "pan";
          panStartX = e.clientX;
          panStartY = e.clientY;
          panOriginX = panX;
          panOriginY = panY;
          canvas.setPointerCapture(e.pointerId);
        } else if (e.clientY < canvas.height - BAR_H) {
          mode = e.button === 2 ? "erase" : "paint";
          applyPaint(e);
        }
      };

      canvas.onpointermove = (e) => {
        if (!mode) return;
        if (mode === "pan") {
          panX = panOriginX + (e.clientX - panStartX);
          panY = panOriginY + (e.clientY - panStartY);
          dirty = true;
        } else if (e.clientY < canvas.height - BAR_H) {
          if (e.getCoalescedEvents) {
            for (const ce of e.getCoalescedEvents()) applyPaint(ce);
          } else {
            applyPaint(e);
          }
        }
      };

      onpointerup = () => { if (mode === "paint" || mode === "erase") scheduleSave(); mode = null; };
      canvas.oncontextmenu = (e) => e.preventDefault();

      canvas.addEventListener("wheel", (e) => {
        e.preventDefault();
        panX -= e.deltaX;
        panY -= e.deltaY;
        dirty = true;
      }, { passive: false });

      load();
      onresize = resize;
      resize();

      (function frame() {
        if (dirty) { dirty = false; draw(); }
        requestAnimationFrame(frame);
      })();
    </script>
  </body>
</html>
