<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Pixel Painter</title>
    <style>
      * {
        margin: 0;
        padding: 0;
      }
      body {
        overflow: hidden;
        background: #1a1a1a;
      }
      canvas {
        display: block;
        touch-action: none;
      }
    </style>
  </head>
  <body>
    <script>
      const PX = 24;
      const MIN_SCALE = 0.25;
      const MAX_SCALE = 8;
      const PAL = [
        "#000000",
        "#1D2B53",
        "#7E2553",
        "#008751",
        "#AB5236",
        "#5F574F",
        "#C2C3C7",
        "#FFF1E8",
        "#FF004D",
        "#FFA300",
        "#FFEC27",
        "#00E436",
        "#29ADFF",
        "#83769C",
        "#FF77A8",
        "#FFCCAA",
      ];
      const BAR_H = 32;

      const canvas = document.createElement("canvas");
      document.body.appendChild(canvas);
      const ctx = canvas.getContext("2d");

      // Offscreen palette bar — redrawn only on color change or resize
      const palCanvas = document.createElement("canvas");
      const palCtx = palCanvas.getContext("2d");
      let palColor = -1;

      const SAVE_KEY = "pixelpainter";
      const filled = new Map(); // key -> { x, y, ci }

      function makeKey(x, y) {
        return x + "," + y;
      }
      function parseKey(k) {
        const sep = k.indexOf(",");
        return [+k.slice(0, sep), +k.slice(sep + 1)];
      }
      function clampScale(s) {
        return Math.min(MAX_SCALE, Math.max(MIN_SCALE, s));
      }

      let mode = null; // 'paint' | 'erase' | 'pan'
      let color = 0;
      let saveTimer = 0;
      let panX = 0,
        panY = 0;
      let panStartX, panStartY, panOriginX, panOriginY;
      let scale = 1;
      let lastModifiedX = null,
        lastModifiedY = null;
      let dirty = true;
      let activeTouches = 0;
      let showHelp = false;

      // Undo / redo
      const MAX_UNDO = 200;
      const undoStack = [];
      const redoStack = [];
      let currentStroke = null; // Map<key, { before, after }>

      function resize() {
        canvas.width = innerWidth;
        canvas.height = innerHeight;
        palCanvas.width = innerWidth;
        palCanvas.height = BAR_H;
        palColor = -1; // force palette redraw
        dirty = true;
      }

      function draw() {
        const S = PX * scale;
        const w = canvas.width,
          h = canvas.height;
        const gridH = h - BAR_H;
        ctx.fillStyle = "#fff";
        ctx.fillRect(0, 0, w, gridH);

        const ox = ((panX % S) + S) % S;
        const oy = ((panY % S) + S) % S;

        // Grid lines — hide when zoomed out far enough to avoid visual noise
        if (S >= 4) {
          ctx.strokeStyle = "#ccc";
          ctx.lineWidth = 0.5;
          ctx.beginPath();
          for (let x = ox; x <= w; x += S) {
            ctx.moveTo(x, 0);
            ctx.lineTo(x, gridH);
          }
          for (let y = oy; y <= gridH; y += S) {
            ctx.moveTo(0, y);
            ctx.lineTo(w, y);
          }
          ctx.stroke();
        }

        // Filled cells — batch by color to minimize fillStyle changes
        const buckets = new Array(PAL.length);
        for (const [, cell] of filled) {
          const sx = cell.x * S + panX;
          const sy = cell.y * S + panY;
          if (sx + S > 0 && sx < w && sy + S > 0 && sy < gridH) {
            (buckets[cell.ci] || (buckets[cell.ci] = [])).push(sx, sy);
          }
        }
        for (let i = 0; i < PAL.length; i++) {
          const b = buckets[i];
          if (!b) continue;
          ctx.fillStyle = PAL[i];
          for (let j = 0; j < b.length; j += 2)
            ctx.fillRect(b[j], b[j + 1], S, S);
        }

        // Palette bar — blit from offscreen canvas
        if (color !== palColor) drawPalette();
        ctx.drawImage(palCanvas, 0, gridH);

        if (showHelp) drawHelp();
      }

      function drawPalette() {
        const w = palCanvas.width;
        const sw = w / PAL.length;
        for (let i = 0; i < PAL.length; i++) {
          palCtx.fillStyle = PAL[i];
          palCtx.fillRect(i * sw, 0, sw, BAR_H);
        }
        // Selection indicator — use luminance for contrast
        const c = PAL[color],
          r = parseInt(c.slice(1, 3), 16),
          g = parseInt(c.slice(3, 5), 16),
          b_ = parseInt(c.slice(5, 7), 16);
        palCtx.strokeStyle =
          r * 0.299 + g * 0.587 + b_ * 0.114 > 140 ? "#000" : "#fff";
        palCtx.lineWidth = 3;
        palCtx.strokeRect(color * sw + 2, 2, sw - 4, BAR_H - 4);
        palCtx.lineWidth = 1;
        palColor = color;
      }

      const HELP_BINDINGS = [
        ["Left Click", "Paint pixel"],
        ["Right Click", "Erase pixel"],
        ["Middle Click", "Pan canvas"],
        ["Scroll", "Zoom in / out"],
        ["Alt + Click", "Eyedropper (pick color)"],
        ["Ctrl+Z", "Undo"],
        ["Ctrl+Shift+Z", "Redo"],
        ["Ctrl+E", "Export viewport as PNG"],
        ["Ctrl+Alt+E", "Export artwork as PNG"],
        ["?", "Toggle this help"],
      ];

      function drawHelp() {
        const w = canvas.width,
          h = canvas.height;
        // Backdrop
        ctx.fillStyle = "rgba(0,0,0,0.75)";
        ctx.fillRect(0, 0, w, h);

        // Panel dimensions
        const lineH = 22;
        const padX = 20,
          padY = 16;
        const titleH = 28;
        const panelW = 420;
        const panelH = titleH + padY * 2 + HELP_BINDINGS.length * lineH;
        const px = Math.round((w - panelW) / 2);
        const py = Math.round((h - panelH) / 2);

        // Panel background
        ctx.fillStyle = "#1D2B53";
        ctx.beginPath();
        ctx.roundRect(px, py, panelW, panelH, 8);
        ctx.fill();
        ctx.strokeStyle = "#29ADFF";
        ctx.lineWidth = 2;
        ctx.stroke();
        ctx.lineWidth = 1;

        // Title
        ctx.fillStyle = "#FFF1E8";
        ctx.font = "bold 16px monospace";
        ctx.textBaseline = "top";
        ctx.fillText("Keyboard Shortcuts", px + padX, py + padY);

        // Bindings
        ctx.font = "13px monospace";
        const startY = py + padY + titleH;
        const keyColX = px + padX;
        const descColX = px + 200;

        for (let i = 0; i < HELP_BINDINGS.length; i++) {
          const [key, desc] = HELP_BINDINGS[i];
          const rowY = startY + i * lineH;

          // Key badge
          const metrics = ctx.measureText(key);
          const badgeW = metrics.width + 12;
          const badgeH = 20;
          ctx.fillStyle = "#29ADFF";
          ctx.beginPath();
          ctx.roundRect(keyColX, rowY, badgeW, badgeH, 4);
          ctx.fill();

          ctx.fillStyle = "#1D2B53";
          ctx.textBaseline = "top";
          ctx.fillText(key, keyColX + 6, rowY + 3);

          // Description
          ctx.fillStyle = "#C2C3C7";
          ctx.fillText(desc, descColX, rowY + 3);
        }
      }

      function cellAt(e) {
        const S = PX * scale;
        const x = Math.floor((e.clientX - panX) / S);
        const y = Math.floor((e.clientY - panY) / S);
        return { key: makeKey(x, y), x, y };
      }

      function hitPalette(e) {
        if (e.clientY < canvas.height - BAR_H) return -1;
        return Math.floor(e.clientX / (canvas.width / PAL.length));
      }

      function save() {
        let json = '{"cells":[';
        let first = true;
        for (const [k, v] of filled) {
          if (first) first = false;
          else json += ",";
          json += '["' + k + '",' + v.ci + "]";
        }
        json += '],"lastModified":';
        json +=
          lastModifiedX != null
            ? '"' + makeKey(lastModifiedX, lastModifiedY) + '"'
            : "null";
        json += "}";
        localStorage.setItem(SAVE_KEY, json);
      }

      function scheduleSave() {
        clearTimeout(saveTimer);
        saveTimer = setTimeout(save, 300);
      }

      function load() {
        const raw = localStorage.getItem(SAVE_KEY);
        if (!raw) return;
        const data = JSON.parse(raw);
        for (const [k, ci] of data.cells) {
          const [x, y] = parseKey(k);
          filled.set(k, { x, y, ci });
        }
        if (data.lastModified) {
          [lastModifiedX, lastModifiedY] = parseKey(data.lastModified);
        }
      }

      function applyPaint(e) {
        const { key, x, y } = cellAt(e);
        if (!currentStroke.has(key)) {
          currentStroke.set(key, {
            before: filled.get(key) || null,
            after: null,
          });
        }
        if (mode === "erase") {
          filled.delete(key);
          currentStroke.get(key).after = null;
        } else {
          const cell = { x, y, ci: color };
          filled.set(key, cell);
          currentStroke.get(key).after = cell;
          lastModifiedX = x;
          lastModifiedY = y;
        }
        dirty = true;
      }

      canvas.onpointerdown = (e) => {
        if (showHelp) {
          showHelp = false;
          dirty = true;
          return;
        }
        if (e.pointerType === "touch") activeTouches++;
        if (activeTouches >= 2) return; // suppress painting during pinch
        const pi = hitPalette(e);
        if (pi >= 0 && e.button === 0) {
          color = pi;
          dirty = true;
          return;
        }
        // Eyedropper: Alt+click picks color from pixel under cursor
        if (e.altKey && e.button === 0) {
          const { key } = cellAt(e);
          const cell = filled.get(key);
          if (cell) {
            color = cell.ci;
            dirty = true;
          }
          return;
        }
        if (e.button === 1) {
          mode = "pan";
          panStartX = e.clientX;
          panStartY = e.clientY;
          panOriginX = panX;
          panOriginY = panY;
          canvas.setPointerCapture(e.pointerId);
        } else if (e.clientY < canvas.height - BAR_H) {
          mode = e.button === 2 ? "erase" : "paint";
          currentStroke = new Map();
          applyPaint(e);
        }
      };

      canvas.onpointermove = (e) => {
        if (!mode || activeTouches >= 2 || showHelp) return;
        if (mode === "pan") {
          panX = panOriginX + (e.clientX - panStartX);
          panY = panOriginY + (e.clientY - panStartY);
          dirty = true;
        } else if (e.clientY < canvas.height - BAR_H) {
          if (e.getCoalescedEvents) {
            for (const ce of e.getCoalescedEvents()) applyPaint(ce);
          } else {
            applyPaint(e);
          }
        }
      };

      window.addEventListener("pointerup", (e) => {
        if (e.pointerType === "touch")
          activeTouches = Math.max(0, activeTouches - 1);
        if (mode === "paint" || mode === "erase") {
          if (currentStroke && currentStroke.size > 0) {
            undoStack.push(currentStroke);
            if (undoStack.length > MAX_UNDO) undoStack.shift();
            redoStack.length = 0;
          }
          currentStroke = null;
          scheduleSave();
        }
        mode = null;
      });
      canvas.oncontextmenu = (e) => e.preventDefault();

      function zoomAt(focusX, focusY, factor) {
        const newScale = clampScale(scale * factor);
        const ratio = newScale / scale;
        panX = focusX - (focusX - panX) * ratio;
        panY = focusY - (focusY - panY) * ratio;
        scale = newScale;
        dirty = true;
      }

      canvas.addEventListener(
        "wheel",
        (e) => {
          e.preventDefault();
          if (showHelp) return;
          zoomAt(e.clientX, e.clientY, Math.pow(0.995, e.deltaY));
        },
        { passive: false },
      );

      // Pinch-to-zoom
      let lastTouchDist = 0;
      let lastTouchCenter = null;

      canvas.addEventListener(
        "touchstart",
        (e) => {
          if (e.touches.length === 2) {
            e.preventDefault();
            const [a, b] = e.touches;
            lastTouchDist = Math.hypot(
              a.clientX - b.clientX,
              a.clientY - b.clientY,
            );
            lastTouchCenter = {
              x: (a.clientX + b.clientX) / 2,
              y: (a.clientY + b.clientY) / 2,
            };
          }
        },
        { passive: false },
      );

      canvas.addEventListener(
        "touchmove",
        (e) => {
          if (e.touches.length === 2) {
            e.preventDefault();
            if (showHelp) return;
            const [a, b] = e.touches;
            const dist = Math.hypot(
              a.clientX - b.clientX,
              a.clientY - b.clientY,
            );
            const center = {
              x: (a.clientX + b.clientX) / 2,
              y: (a.clientY + b.clientY) / 2,
            };

            zoomAt(center.x, center.y, dist / lastTouchDist);

            // Pan with two-finger drag
            panX += center.x - lastTouchCenter.x;
            panY += center.y - lastTouchCenter.y;
            lastTouchDist = dist;
            lastTouchCenter = center;
            dirty = true;
          }
        },
        { passive: false },
      );

      function exportPNG(viewportMode) {
        const exp = document.createElement("canvas");
        const ectx = exp.getContext("2d");
        if (viewportMode) {
          // Export exactly what's on screen, minus the palette bar
          const gridH = canvas.height - BAR_H;
          exp.width = canvas.width;
          exp.height = gridH;
          ectx.drawImage(
            canvas,
            0,
            0,
            canvas.width,
            gridH,
            0,
            0,
            canvas.width,
            gridH,
          );
        } else {
          // Export tight-cropped 1:1 pixel art
          if (filled.size === 0) return;
          let minX = Infinity,
            minY = Infinity,
            maxX = -Infinity,
            maxY = -Infinity;
          for (const [, cell] of filled) {
            if (cell.x < minX) minX = cell.x;
            if (cell.y < minY) minY = cell.y;
            if (cell.x > maxX) maxX = cell.x;
            if (cell.y > maxY) maxY = cell.y;
          }
          exp.width = maxX - minX + 1;
          exp.height = maxY - minY + 1;
          for (const [, cell] of filled) {
            ectx.fillStyle = PAL[cell.ci];
            ectx.fillRect(cell.x - minX, cell.y - minY, 1, 1);
          }
        }
        const a = document.createElement("a");
        a.download = "pixel-art.png";
        a.href = exp.toDataURL("image/png");
        a.click();
      }

      function applyStroke(from, to, prop) {
        if (!from.length) return;
        const stroke = from.pop();
        for (const [key, delta] of stroke) {
          if (delta[prop]) filled.set(key, delta[prop]);
          else filled.delete(key);
        }
        to.push(stroke);
        dirty = true;
        scheduleSave();
      }

      function undo() {
        applyStroke(undoStack, redoStack, "before");
      }
      function redo() {
        applyStroke(redoStack, undoStack, "after");
      }

      window.addEventListener("keydown", (e) => {
        if (e.key === "?" && !e.ctrlKey && !e.metaKey) {
          showHelp = !showHelp;
          dirty = true;
          return;
        }
        if (e.key === "Escape" && showHelp) {
          showHelp = false;
          dirty = true;
          return;
        }
        if (showHelp) return; // swallow other keys while overlay is open
        if (e.key === "Alt") canvas.style.cursor = "crosshair";
        if ((e.ctrlKey || e.metaKey) && e.altKey && e.key === "e") {
          e.preventDefault();
          exportPNG(false);
        } else if ((e.ctrlKey || e.metaKey) && !e.altKey && e.key === "e") {
          e.preventDefault();
          exportPNG(true);
        } else if ((e.ctrlKey || e.metaKey) && e.key === "z" && !e.shiftKey) {
          e.preventDefault();
          undo();
        } else if ((e.ctrlKey || e.metaKey) && e.key === "Z" && e.shiftKey) {
          e.preventDefault();
          redo();
        }
      });
      window.addEventListener("keyup", (e) => {
        if (e.key === "Alt") canvas.style.cursor = "";
      });

      load();
      window.addEventListener("resize", resize);
      resize();

      // Center on last modified pixel
      if (lastModifiedX != null) {
        const S = PX * scale;
        panX = Math.round(canvas.width / 2 - (lastModifiedX + 0.5) * S);
        panY = Math.round(
          (canvas.height - BAR_H) / 2 - (lastModifiedY + 0.5) * S,
        );
        dirty = true;
      }

      (function frame() {
        if (dirty) {
          dirty = false;
          draw();
        }
        requestAnimationFrame(frame);
      })();
    </script>
  </body>
</html>
